name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        run: |
          git remote add source https://github.com/fengshao1227/ccg-workflow.git
          git fetch source main

      - name: Mirror upstream/main to fork branch upstream
        run: |
          git checkout -B upstream source/main
          git push origin upstream --force
